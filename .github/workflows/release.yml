name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.0)"
        required: true
        type: string
      name:
        description: "Release name (e.g. Steam Manifest Downloader v1.2.0)"
        required: false
        type: string
      body:
        description: "Release description (supports Markdown)"
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Windows build
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust dependency cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI (binstall = fast)
        run: cargo install cargo-binstall --locked && cargo binstall tauri-cli --version "^2.0" -y

      - name: Build Tauri app
        run: cargo tauri build

      - name: Sign executables with SignTool
        if: env.SIGNING_CERTIFICATE != ''
        env:
          SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "signing-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" -Recurse | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Error "SignTool not found!"; exit 1 }

          # Sign portable EXE
          $portable = "src-tauri\target\release\steam-manifest-downloader.exe"
          if (Test-Path $portable) {
            & $signtool.FullName sign /f $certPath /p $env:SIGNING_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $portable
          }

          # Sign NSIS installer
          Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" | ForEach-Object {
            & $signtool.FullName sign /f $certPath /p $env:SIGNING_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }

          Remove-Item $certPath -Force

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: src-tauri/target/release/steam-manifest-downloader.exe

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ──────────────────────────────────────────────
  # Linux build — compile on Arch, bundle AppImage on Ubuntu
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build binary in Arch Linux container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            archlinux:latest \
            bash -c '
              set -e
              pacman -Syu --noconfirm
              pacman -S --noconfirm \
                base-devel webkit2gtk-4.1 gtk3 libappindicator-gtk3 \
                librsvg patchelf curl wget file openssl pkgconf

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
              source /root/.cargo/env

              # Use binstall for faster Tauri CLI install
              cargo install cargo-binstall --locked
              cargo binstall tauri-cli --version "^2.0" -y

              NO_STRIP=true cargo tauri build --no-bundle
              ls -la src-tauri/target/release/steam-manifest-downloader
            '

      - name: Create AppImage
        env:
          NO_STRIP: "true"
        run: |
          set -e
          BINARY="src-tauri/target/release/steam-manifest-downloader"
          APP_NAME="Steam Manifest Downloader"
          VERSION=$(grep -oP '"version":\s*"\K[^"]+' src-tauri/tauri.conf.json)

          if [ ! -f "$BINARY" ]; then echo "ERROR: Binary not found"; exit 1; fi

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp "$BINARY" AppDir/usr/bin/steam-manifest-downloader
          chmod +x AppDir/usr/bin/steam-manifest-downloader

          cat > AppDir/usr/share/applications/steam-manifest-downloader.desktop << 'DESKTOP'
          [Desktop Entry]
          Categories=Utility;
          Exec=steam-manifest-downloader
          Icon=steam-manifest-downloader
          Name=Steam Manifest Downloader
          Type=Application
          Terminal=false
          DESKTOP
          sed -i 's/^          //' AppDir/usr/share/applications/steam-manifest-downloader.desktop

          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/steam-manifest-downloader.png

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF_DIR="$(dirname "$(readlink -f "$0")")"
          export PATH="${SELF_DIR}/usr/bin:${PATH}"
          exec "${SELF_DIR}/usr/bin/steam-manifest-downloader" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

          ln -sf usr/share/applications/steam-manifest-downloader.desktop AppDir/steam-manifest-downloader.desktop
          ln -sf usr/share/icons/hicolor/256x256/apps/steam-manifest-downloader.png AppDir/steam-manifest-downloader.png

          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir "${APP_NAME}_${VERSION}_amd64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: "Steam Manifest Downloader_*_amd64.AppImage"

  # ──────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ inputs.name || format('Steam Manifest Downloader {0}', steps.tag.outputs.tag) }}
          body: ${{ inputs.body || '' }}
          generate_release_notes: ${{ inputs.body == '' || inputs.body == null }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          files: |
            artifacts/windows-portable/*
            artifacts/windows-nsis/*
            artifacts/linux-builds/*
